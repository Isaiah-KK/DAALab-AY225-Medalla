<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global EdStats - Enrollment</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body data-page="enrollment">

<div class="dashboard-container">
    <aside class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-globe brand-icon"></i>
            <div class="brand-text"><h1>Global EdStats</h1><span>World Bank Data</span></div>
        </div>

        <div class="filter-section">
            <label class="filter-label">Indicators</label>
            <div class="indicator-buttons">
                <a href="index.html" class="btn-indicator"><i class="fa-solid fa-book-open"></i> Literacy & Reading</a>
                <a href="enrollment.html" class="btn-indicator active"><i class="fa-solid fa-graduation-cap"></i> Enrollment Rates</a>
                <a href="expenditure.html" class="btn-indicator"><i class="fa-solid fa-sack-dollar"></i> Gov. Expenditure</a>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <div>
                <h2>Gross Tertiary Enrollment Ratio (%)</h2>
                <p class="subtitle">Tracking the percentage of students entering higher education.</p>
            </div>
        </header>

        <div class="kpi-grid">
            <div class="card kpi-card">
                <p class="kpi-title">Global Tertiary Enrollment</p>
                <div class="kpi-value-container"><h3>40.2%</h3><span class="kpi-trend positive">+1.2%</span></div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="card chart-card trend-chart">
                <div class="chart-header"><h3>Enrollment Trends</h3></div>
                <div class="chart-container"><canvas id="trendChart"></canvas></div>
            </div>
            <div class="card chart-card bar-chart">
                <div class="chart-header"><h3>Regional Comparison</h3></div>
                <div class="chart-container"><canvas id="barChart"></canvas></div>
            </div>
        </div>
    </main>
</div>
<script src="script.js"></script>
</body>
</html>
